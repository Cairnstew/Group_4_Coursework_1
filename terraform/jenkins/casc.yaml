# jenkins/casc.yaml
jenkins:
  systemMessage: "Jenkins managed by JCasC"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"
  authorizationStrategy:
    globalMatrix:
      permissions:
        - "USER:Overall/Administer:admin"
        - "GROUP:Overall/Read:authenticated"

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "SonarQube"
              secret: "${SONAR_TOKEN}"
              description: "SonarQube token"

unclassified:
  sonarGlobalConfiguration:
    buildWrapperEnabled: true
    installations:
      - name: "SonarQube"
        serverUrl: "http://sonarqube:9000"
        credentialsId: "SonarQube"
jobs:
  - script: >
      freeStyleJob('my-app') {
          description('My application freestyle job')

          scm {
              git {
                  remote {
                      url('https://github.com/Cairnstew/Group_4_Coursework_1')
                  }
                  branch('*/main')
              }
          }

          triggers {
              scm('H/5 * * * *')
          }

          steps {
              sonarRunnerBuilder {
                  project('./sonar-project.properties')
              }

              shell('python3 Dec2Hex.py 255')
              shell('python3 Dec2Hex.py')
              shell('python3 Dec2Hex.py hello')
              shell('python3 -m pytest test_Dec2Hex.py -v || true')
          }
      }

tool:
  git:
    installations:
    - home: "git"
      name: "Default"
  mavenGlobalConfig:
    globalSettingsProvider: "standard"
    settingsProvider: "standard"
  sonarRunnerInstallation:
    installations:
    - name: "SonarScanner"
      properties:
      - installSource:
          installers:
          - sonarRunnerInstaller:
              id: "8.0.1.6346"
